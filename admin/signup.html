<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - LUXE WATCHES Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="login-body">

<div class="login-container">
    <div class="login-left">
        <div class="login-brand">
            <i class="fas fa-clock"></i>
            <h1>LUXE <span>WATCHES</span></h1>
            <p>Create Admin Account</p>
        </div>
        <div class="login-features">
            <div class="login-feature"><i class="fas fa-shield-alt"></i><span>Secure Registration</span></div>
            <div class="login-feature"><i class="fas fa-user-shield"></i><span>Admin Access</span></div>
            <div class="login-feature"><i class="fas fa-lock"></i><span>Encrypted Password</span></div>
            <div class="login-feature"><i class="fas fa-check-circle"></i><span>Instant Activation</span></div>
        </div>
    </div>
    <div class="login-right">
        <div class="login-form-container">
            <h2>Create Account</h2>
            <p class="login-subtitle">Register as a new admin</p>
            <form id="signupForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name *</label>
                    <input type="text" id="signupName" placeholder="Enter full name" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-at"></i> Username *</label>
                    <input type="text" id="signupUsername" placeholder="Choose a username" required>
                    <small class="field-hint">Letters, numbers, underscore only. Min 3 chars.</small>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email *</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password *</label>
                    <div class="password-wrap">
                        <input type="password" id="signupPassword" placeholder="Create a password" required>
                        <button type="button" id="togglePass1"><i class="fas fa-eye"></i></button>
                    </div>
                    <div class="password-strength" id="passStrength"></div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Confirm Password *</label>
                    <div class="password-wrap">
                        <input type="password" id="signupConfirmPassword" placeholder="Confirm password" required>
                        <button type="button" id="togglePass2"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn-login" id="signupBtn">
                    <span class="btn-text"><i class="fas fa-user-plus"></i> Create Account</span>
                    <span class="btn-loading" style="display:none;"><i class="fas fa-spinner fa-spin"></i> Creating...</span>
                </button>
                <div class="login-error" id="signupError" style="display:none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="signupErrorText">Error</span>
                </div>
                <div class="login-success" id="signupSuccess" style="display:none;">
                    <i class="fas fa-check-circle"></i>
                    <span id="signupSuccessText">Account created!</span>
                </div>
            </form>
            <div class="login-links">
                <a href="index.html" class="auth-link"><i class="fas fa-sign-in-alt"></i> Already have account? Sign In</a>
            </div>
            <div class="login-footer">
                <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
            </div>
        </div>
    </div>
</div>

    <script src="../js/config.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var t1 = document.getElementById("togglePass1");
            var t2 = document.getElementById("togglePass2");
            if (t1) {
                t1.addEventListener("click", function() {
                    var inp = document.getElementById("signupPassword");
                    var ico = this.querySelector("i");
                    if (inp.type === "password") { inp.type = "text"; ico.className = "fas fa-eye-slash"; }
                    else { inp.type = "password"; ico.className = "fas fa-eye"; }
                });
            }
            if (t2) {
                t2.addEventListener("click", function() {
                    var inp = document.getElementById("signupConfirmPassword");
                    var ico = this.querySelector("i");
                    if (inp.type === "password") { inp.type = "text"; ico.className = "fas fa-eye-slash"; }
                    else { inp.type = "password"; ico.className = "fas fa-eye"; }
                });
            }
            var passInput = document.getElementById("signupPassword");
            if (passInput) {
                passInput.addEventListener("input", function() {
                    var val = this.value;
                    var el = document.getElementById("passStrength");
                    if (!el) { return; }
                    if (!val) { el.innerHTML = ""; return; }
                    var score = 0;
                    if (val.length >= 6) { score++; }
                    if (val.length >= 10) { score++; }
                    if (/[A-Z]/.test(val)) { score++; }
                    if (/[0-9]/.test(val)) { score++; }
                    if (/[^A-Za-z0-9]/.test(val)) { score++; }
                    var labels = ["Very Weak", "Weak", "Fair", "Strong", "Very Strong"];
                    var colors = ["#e74c3c", "#e67e22", "#f1c40f", "#2ecc71", "#27ae60"];
                    var widths = ["20%", "40%", "60%", "80%", "100%"];
                    var idx = Math.min(score, 4);
                    el.innerHTML = "<div class=\"strength-bar\"><div class=\"strength-fill\" style=\"width:" + widths[idx] + ";background:" + colors[idx] + "\"></div></div>"
                        + "<span style=\"color:" + colors[idx] + ";font-size:0.75rem;\">" + labels[idx] + "</span>";
                });
            }
            var signupForm = document.getElementById("signupForm");
            if (signupForm) {
                signupForm.addEventListener("submit", function(e) {
                    e.preventDefault();
                    var name = document.getElementById("signupName").value.trim();
                    var username = document.getElementById("signupUsername").value.trim();
                    var email = document.getElementById("signupEmail").value.trim();
                    var password = document.getElementById("signupPassword").value;
                    var confirmPass = document.getElementById("signupConfirmPassword").value;
                    var errorEl = document.getElementById("signupError");
                    var errorText = document.getElementById("signupErrorText");
                    var successEl = document.getElementById("signupSuccess");
                    var successText = document.getElementById("signupSuccessText");
                    var btn = document.getElementById("signupBtn");
                    var btnText = btn.querySelector(".btn-text");
                    var btnLoading = btn.querySelector(".btn-loading");
                    errorEl.style.display = "none";
                    successEl.style.display = "none";
                    if (password !== confirmPass) {
                        errorText.textContent = "Passwords do not match!";
                        errorEl.style.display = "flex";
                        return;
                    }
                    btnText.style.display = "none";
                    btnLoading.style.display = "inline-flex";
                    btn.disabled = true;
                    signupUser({
                        fullName: name, username: username,
                        email: email, password: password
                    }).then(function(result) {
                        if (result.success) {
                            successText.textContent = result.message;
                            successEl.style.display = "flex";
                            signupForm.reset();
                            setTimeout(function() { window.location.href = "index.html"; }, 2000);
                        } else {
                            errorText.textContent = result.error;
                            errorEl.style.display = "flex";
                        }
                        btnText.style.display = "inline-flex";
                        btnLoading.style.display = "none";
                        btn.disabled = false;
                    });
                });
            }
        });
    </script>
</body>
</html>
</body>
</html>
