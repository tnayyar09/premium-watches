<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LUXE WATCHES</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="login-body">

<div class="login-container">
    <div class="login-left">
        <div class="login-brand">
            <i class="fas fa-clock"></i>
            <h1>LUXE <span>WATCHES</span></h1>
            <p>Admin Control Panel</p>
        </div>
        <div class="login-features">
            <div class="login-feature"><i class="fas fa-box"></i><span>Manage Products</span></div>
            <div class="login-feature"><i class="fas fa-images"></i><span>Manage Banners</span></div>
            <div class="login-feature"><i class="fas fa-envelope"></i><span>View Messages</span></div>
            <div class="login-feature"><i class="fas fa-users-cog"></i><span>User Management</span></div>
        </div>
    </div>
    <div class="login-right">
        <div class="login-form-container">
            <h2>Welcome Back</h2>
            <p class="login-subtitle">Sign in to your admin account</p>
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="password-wrap">
                        <input type="password" id="loginPassword" placeholder="Enter password" required>
                        <button type="button" id="togglePass">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="btn-login">
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Sign In</span>
                    <span class="btn-loading" style="display:none;"><i class="fas fa-spinner fa-spin"></i> Signing in...</span>
                </button>
                <div class="login-error" id="loginError" style="display:none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="loginErrorText">Invalid credentials</span>
                </div>
                <div class="login-success" id="loginSuccess" style="display:none;">
                    <i class="fas fa-check-circle"></i>
                    <span>Login successful! Redirecting...</span>
                </div>
            </form>
            <div class="login-links">
                <a href="signup.html" class="auth-link"><i class="fas fa-user-plus"></i> Create New Account</a>
                <a href="forgot-password.html" class="auth-link"><i class="fas fa-key"></i> Forgot Password?</a>
            </div>
            <div class="login-footer">
                <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
            </div>
        </div>
    </div>
</div>

<script src="js/admin.js"></script>
<script src="js/auth.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {

        if (sessionStorage.getItem("adminLoggedIn") === "true") {
            window.location.href = "dashboard.html";
            return;
        }

        var toggleBtn = document.getElementById("togglePass");
        if (toggleBtn) {
            toggleBtn.addEventListener("click", function() {
                var inp = document.getElementById("loginPassword");
                var ico = this.querySelector("i");
                if (inp.type === "password") {
                    inp.type = "text";
                    ico.className = "fas fa-eye-slash";
                } else {
                    inp.type = "password";
                    ico.className = "fas fa-eye";
                }
            });
        }

        var loginForm = document.getElementById("loginForm");
        if (loginForm) {
            loginForm.addEventListener("submit", function(e) {
                e.preventDefault();
                var username = document.getElementById("loginUsername").value.trim();
                var password = document.getElementById("loginPassword").value;
                var errorEl = document.getElementById("loginError");
                var errorText = document.getElementById("loginErrorText");
                var successEl = document.getElementById("loginSuccess");
                var btn = document.getElementById("loginBtn");
                var btnText = btn.querySelector(".btn-text");
                var btnLoading = btn.querySelector(".btn-loading");

                errorEl.style.display = "none";
                successEl.style.display = "none";

                if (!username || !password) {
                    errorText.textContent = "Please enter username and password";
                    errorEl.style.display = "flex";
                    return;
                }

                btnText.style.display = "none";
                btnLoading.style.display = "inline-flex";
                btn.disabled = true;

                loginUser(username, password).then(function(result) {
                    if (result.success) {
                        successEl.style.display = "flex";
                        setTimeout(function() {
                            window.location.href = "dashboard.html";
                        }, 800);
                    } else {
                        errorText.textContent = result.error || "Invalid credentials";
                        errorEl.style.display = "flex";
                        btnText.style.display = "inline-flex";
                        btnLoading.style.display = "none";
                        btn.disabled = false;
                    }
                }).catch(function(err) {
                    console.error(err);
                    errorText.textContent = "Connection error!";
                    errorEl.style.display = "flex";
                    btnText.style.display = "inline-flex";
                    btnLoading.style.display = "none";
                    btn.disabled = false;
                });
            });
        }
    });
</script>
</body>
</html>
