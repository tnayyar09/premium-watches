<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - LUXE WATCHES</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-left">
            <div class="login-brand">
                <i class="fas fa-clock"></i>
                <h1>LUXE <span>WATCHES</span></h1>
                <p>Admin Control Panel</p>
            </div>
            <div class="login-features">
                <div class="login-feature"><i class="fas fa-box"></i><span>Manage Products</span></div>
                <div class="login-feature"><i class="fas fa-images"></i><span>Manage Banners</span></div>
                <div class="login-feature"><i class="fas fa-envelope"></i><span>View Messages</span></div>
                <div class="login-feature"><i class="fas fa-chart-bar"></i><span>Dashboard Analytics</span></div>
            </div>
        </div>
        <div class="login-right">
            <div class="login-form-container">
                <h2>Welcome Back</h2>
                <p class="login-subtitle">Sign in to your admin account</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Username</label>
                        <input type="text" id="loginUsername" placeholder="Enter username" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="password-wrap">
                            <input type="password" id="loginPassword" placeholder="Enter password" required>
                            <button type="button" class="toggle-pass" id="togglePass">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-check">
                        <label><input type="checkbox" id="rememberMe"> Remember me</label>
                    </div>
                    <button type="submit" class="btn-login" id="loginBtn">
                        <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Sign In</span>
                        <span class="btn-loading" style="display:none"><i class="fas fa-spinner fa-spin"></i> Signing in...</span>
                    </button>
                    <div class="login-error" id="loginError" style="display:none">
                        <i class="fas fa-exclamation-circle"></i>
                        <span>Invalid username or password</span>
                    </div>
                </form>
                
                <div class="login-footer">
                    <p>Default: <strong>admin</strong> / <strong>luxe@2025</strong></p>
                    <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        // Check if already logged in
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');
            
            btn.querySelector('.btn-text').style.display = 'none';
            btn.querySelector('.btn-loading').style.display = 'inline-flex';
            errorEl.style.display = 'none';

            setTimeout(() => {
                // Simple auth - you can change credentials here
                if (username === 'admin' && password === 'luxe@2025') {
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    sessionStorage.setItem('adminUser', username);
                    window.location.href = 'dashboard.html';
                } else {
                    errorEl.style.display = 'flex';
                    btn.querySelector('.btn-text').style.display = 'inline-flex';
                    btn.querySelector('.btn-loading').style.display = 'none';
                }
            }, 1000);
        });

        document.getElementById('togglePass').addEventListener('click', function() {
            const passInput = document.getElementById('loginPassword');
            const icon = this.querySelector('i');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    </script>
</body>
</html>
