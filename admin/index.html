        "https://fxpxsmnakwqczgrhiwkl.supabase.co",

    );

    if (sessionStorage.getItem("adminLoggedIn") === "true") {
        window.location.href = "dashboard.html";
    }

    document.getElementById("togglePass").addEventListener("click", function() {
        var inp = document.getElementById("loginPassword");
        var ico = this.querySelector("i");
        if (inp.type === "password") {
            inp.type = "text";
            ico.className = "fas fa-eye-slash";
        } else {
            inp.type = "password";
            ico.className = "fas fa-eye";
        }
    });

    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();

        var username = document.getElementById("loginUsername").value.trim();
        var password = document.getElementById("loginPassword").value;
        var errorEl = document.getElementById("loginError");
        var successEl = document.getElementById("loginSuccess");
        var btn = document.getElementById("loginBtn");
        var btnText = btn.querySelector(".btn-text");
        var btnLoading = btn.querySelector(".btn-loading");

        btnText.style.display = "none";
        btnLoading.style.display = "inline-flex";
        errorEl.style.display = "none";
        if (successEl) { successEl.style.display = "none"; }

        // STEP 1: Try database login
        loginUser(username, password).then(function(result) {
            if (result.success) {
                if (successEl) { successEl.style.display = "flex"; }
                setTimeout(function() {
                    window.location.href = "dashboard.html";
                }, 800);
            } else {
                // STEP 2: Agar database fail ho toh hash debug karo
                var generatedHash = simpleHash(password);
                console.log("=== LOGIN DEBUG ===");
                console.log("Username:", username);
                console.log("Generated Hash:", generatedHash);
                console.log("Trying to match in database...");
                console.log("Run this SQL in Supabase:");
                console.log("SELECT * FROM admin_users WHERE username = '" + username + "';");
                console.log("==================");

                document.getElementById("loginErrorText").textContent = result.error + " (Check console for debug info)";
                errorEl.style.display = "flex";
                btnText.style.display = "inline-flex";
                btnLoading.style.display = "none";
            }
        }).catch(function(err) {
            console.error("Login error:", err);
            document.getElementById("loginErrorText").textContent = "Connection error!";
            errorEl.style.display = "flex";
            btnText.style.display = "inline-flex";
            btnLoading.style.display = "none";
        });
    });
</script>
