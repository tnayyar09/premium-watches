<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - LUXE WATCHES Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo"><i class="fas fa-clock"></i><div><span class="logo-main">LUXE</span><span class="logo-sub">ADMIN</span></div></div>
        <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
    </div>
    <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
        <a href="products.html" class="nav-item active"><i class="fas fa-box"></i><span>Products</span></a>
        <a href="banners.html" class="nav-item"><i class="fas fa-images"></i><span>Banners</span></a>
        <a href="messages.html" class="nav-item"><i class="fas fa-envelope"></i><span>Messages</span></a>
        <div class="nav-divider"></div>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
        <a href="change-password.html" class="nav-item"><i class="fas fa-key"></i><span>Change Password</span></a>
        <a href="manage-users.html" class="nav-item"><i class="fas fa-users-cog"></i><span>Manage Users</span></a>
        <div class="nav-divider"></div>
        <a href="../index.html" target="_blank" class="nav-item"><i class="fas fa-globe"></i><span>View Website</span></a>
        <a href="#" class="nav-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
    </nav>
</aside>

<main class="main-content">
    <header class="topbar">
        <div class="topbar-left">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <h2>Products Management</h2>
        </div>
        <div class="topbar-right">
            <button class="btn-add" id="addProductBtn"><i class="fas fa-plus"></i> Add Product</button>
        </div>
    </header>

    <div class="content-area">
        <div class="toolbar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchProducts" placeholder="Search products...">
            </div>
            <div class="toolbar-filters">
                <select id="filterCategory">
                    <option value="">All Categories</option>
                    <option value="Luxury">Luxury</option>
                    <option value="Sports">Sports</option>
                    <option value="Classic">Classic</option>
                    <option value="Smart Watch">Smart Watch</option>
                    <option value="Casual">Casual</option>
                </select>
                <select id="filterFeatured">
                    <option value="">All</option>
                    <option value="true">Featured</option>
                    <option value="false">Non-Featured</option>
                </select>
            </div>
        </div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Orig. Price</th>
                        <th>Featured</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <tr><td colspan="7" class="loading-cell"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="table-pagination" id="productsPagination"></div>
    </div>
</main>

<div class="modal-overlay" id="productModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle"><i class="fas fa-box"></i> Add Product</h3>
            <button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <form id="productForm">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>Product Title *</label>
                    <input type="text" id="prodTitle" required placeholder="e.g. Rolex Submariner">
                </div>
                <div class="form-group">
                    <label>Short Description</label>
                    <textarea id="prodDescription" rows="3" placeholder="Brief description..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Price (Rs.) *</label>
                        <input type="number" id="prodPrice" required min="0" step="0.01" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Original Price (Rs.)</label>
                        <input type="number" id="prodOriginalPrice" min="0" step="0.01" placeholder="For discount">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="prodCategory">
                            <option value="">Select</option>
                            <option value="Luxury">Luxury</option>
                            <option value="Sports">Sports</option>
                            <option value="Classic">Classic</option>
                            <option value="Smart Watch">Smart Watch</option>
                            <option value="Casual">Casual</option>
                            <option value="Dress">Dress</option>
                        </select>
                        <input type="text" id="prodCustomCategory" placeholder="Or type custom" style="margin-top:8px;">
                    </div>
                    <div class="form-group">
                        <label>Featured?</label>
                        <div class="toggle-switch-wrap">
                            <label class="toggle-switch">
                                <input type="checkbox" id="prodFeatured">
                                <span class="toggle-slider"></span>
                            </label>
                            <span class="toggle-label" id="featuredLabel">No</span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Image URL *</label>
                    <input type="url" id="prodImageUrl" required placeholder="https://example.com/image.jpg">
                    <div class="image-preview-wrap">
                        <div class="image-preview" id="imagePreview">
                            <i class="fas fa-image"></i><span>Image Preview</span>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" id="cancelProduct">Cancel</button>
                    <button type="submit" class="btn-save" id="saveProductBtn">
                        <span class="btn-text"><i class="fas fa-save"></i> Save</span>
                        <span class="btn-loading" style="display:none;"><i class="fas fa-spinner fa-spin"></i> Saving...</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal-overlay" id="deleteModal">
    <div class="modal modal-sm">
        <div class="modal-header modal-header-danger">
            <h3><i class="fas fa-exclamation-triangle"></i> Confirm Delete</h3>
        </div>
        <div class="modal-body text-center">
            <p style="margin-bottom:8px;">Delete <strong id="deleteItemName"></strong>?</p>
            <p style="color:#999;font-size:0.85rem;margin-bottom:20px;">Cannot be undone.</p>
            <div class="form-actions" style="justify-content:center;">
                <button class="btn-cancel" id="cancelDelete">Cancel</button>
                <button class="btn-delete" id="confirmDelete"><i class="fas fa-trash"></i> Delete</button>
            </div>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/admin.js"></script>
<script src="js/auth.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        checkAuth();

        var productPage = 1;
        var PRODUCTS_PER_PAGE = 8;
        var deleteProductId = null;

        // Listeners
        document.getElementById("addProductBtn").addEventListener("click", function() { openProductModal(null); });
        document.getElementById("closeModal").addEventListener("click", closeProductModal);
        document.getElementById("cancelProduct").addEventListener("click", closeProductModal);
        document.getElementById("productModal").addEventListener("click", function(e) { if (e.target === this) { closeProductModal(); } });

        document.getElementById("prodFeatured").addEventListener("change", function() {
            document.getElementById("featuredLabel").textContent = this.checked ? "Yes" : "No";
        });

        document.getElementById("prodImageUrl").addEventListener("input", function() {
            var preview = document.getElementById("imagePreview");
            if (this.value) {
                preview.innerHTML = "<img src=\"" + this.value + "\" alt=\"Preview\" style=\"width:100%;height:100%;object-fit:cover;\">";
            } else {
                preview.innerHTML = "<i class=\"fas fa-image\"></i><span>Image Preview</span>";
            }
        });

        var searchTimer = null;
        document.getElementById("searchProducts").addEventListener("input", function() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(function() { loadProducts(1); }, 400);
        });

        document.getElementById("filterCategory").addEventListener("change", function() { loadProducts(1); });
        document.getElementById("filterFeatured").addEventListener("change", function() { loadProducts(1); });

        document.getElementById("cancelDelete").addEventListener("click", function() {
            document.getElementById("deleteModal").classList.remove("active");
        });

        document.getElementById("confirmDelete").addEventListener("click", function() {
            if (!deleteProductId) { return; }
            adminDelete("products", deleteProductId).then(function(ok) {
                if (ok) { showToast("Product deleted!", "success"); loadProducts(productPage); }
                else { showToast("Delete failed!", "error"); }
                document.getElementById("deleteModal").classList.remove("active");
                deleteProductId = null;
            });
        });

        document.getElementById("productForm").addEventListener("submit", function(e) {
            e.preventDefault();
            saveProduct();
        });

        // Functions
        function openProductModal(product) {
            document.getElementById("productForm").reset();
            document.getElementById("imagePreview").innerHTML = "<i class=\"fas fa-image\"></i><span>Image Preview</span>";
            document.getElementById("featuredLabel").textContent = "No";
            if (product) {
                document.getElementById("modalTitle").innerHTML = "<i class=\"fas fa-edit\"></i> Edit Product";
                document.getElementById("productId").value = product.id;
                document.getElementById("prodTitle").value = product.title || "";
                document.getElementById("prodDescription").value = product.short_description || "";
                document.getElementById("prodPrice").value = product.price || "";
                document.getElementById("prodOriginalPrice").value = product.original_price || "";
                document.getElementById("prodCategory").value = product.category || "";
                document.getElementById("prodFeatured").checked = product.is_featured ? true : false;
                document.getElementById("featuredLabel").textContent = product.is_featured ? "Yes" : "No";
                document.getElementById("prodImageUrl").value = product.image_url || "";
                if (product.image_url) {
                    document.getElementById("imagePreview").innerHTML = "<img src=\"" + product.image_url + "\" alt=\"Preview\" style=\"width:100%;height:100%;object-fit:cover;\">";
                }
            } else {
                document.getElementById("modalTitle").innerHTML = "<i class=\"fas fa-plus-circle\"></i> Add New Product";
                document.getElementById("productId").value = "";
            }
            document.getElementById("productModal").classList.add("active");
        }

        function closeProductModal() {
            document.getElementById("productModal").classList.remove("active");
        }

        window.editProduct = function(id) {
            adminQuery("products", { filters: ["id=eq." + id] }).then(function(r) {
                if (r.data && r.data.length > 0) { openProductModal(r.data[0]); }
            });
        };

        window.deleteProduct = function(id, name) {
            deleteProductId = id;
            document.getElementById("deleteItemName").textContent = name;
            document.getElementById("deleteModal").classList.add("active");
        };

        function saveProduct() {
            var btn = document.getElementById("saveProductBtn");
            var btnText = btn.querySelector(".btn-text");
            var btnLoading = btn.querySelector(".btn-loading");
            btnText.style.display = "none";
            btnLoading.style.display = "inline-flex";

            var id = document.getElementById("productId").value;
            var customCat = document.getElementById("prodCustomCategory").value.trim();
            var selectedCat = document.getElementById("prodCategory").value;
            var body = {
                title: document.getElementById("prodTitle").value.trim(),
                short_description: document.getElementById("prodDescription").value.trim(),
                price: parseFloat(document.getElementById("prodPrice").value),
                category: customCat ? customCat : selectedCat,
                is_featured: document.getElementById("prodFeatured").checked,
                image_url: document.getElementById("prodImageUrl").value.trim()
            };
            var origPrice = document.getElementById("prodOriginalPrice").value;
            body.original_price = origPrice ? parseFloat(origPrice) : null;

            var promise = id ? adminUpdate("products", id, body) : adminInsert("products", body);
            promise.then(function(ok) {
                if (ok) {
                    showToast(id ? "Updated!" : "Product added!", "success");
                    closeProductModal();
                    loadProducts(productPage);
                } else {
                    showToast("Save failed!", "error");
                }
                btnText.style.display = "inline-flex";
                btnLoading.style.display = "none";
            });
        }

        function loadProducts(page) {
            if (!page) { page = 1; }
            productPage = page;
            var tbody = document.getElementById("productsTableBody");
            tbody.innerHTML = "<tr><td colspan=\"7\" class=\"loading-cell\"><i class=\"fas fa-spinner fa-spin\"></i> Loading...</td></tr>";

            var filters = [];
            var catFilter = document.getElementById("filterCategory").value;
            var featFilter = document.getElementById("filterFeatured").value;
            if (catFilter) { filters.push("category=eq." + encodeURIComponent(catFilter)); }
            if (featFilter) { filters.push("is_featured=eq." + featFilter); }

            var offset = (page - 1) * PRODUCTS_PER_PAGE;

            adminQuery("products", {
                filters: filters,
                order: "created_at.desc",
                limit: PRODUCTS_PER_PAGE,
                offset: offset,
                count: true
            }).then(function(result) {
                var data = result.data;
                var count = result.count || 0;
                if (!data || data.length === 0) {
                    tbody.innerHTML = "<tr><td colspan=\"7\" class=\"empty-cell\">No products found</td></tr>";
                    document.getElementById("productsPagination").innerHTML = "";
                    return;
                }
                var html = "";
                for (var i = 0; i < data.length; i++) {
                    var p = data[i];
                    var safeTitle = (p.title || "").replace(/'/g, "\\'");
                    html += "<tr>"
                        + "<td><img src=\"" + p.image_url + "\" class=\"table-img\" alt=\"\" onerror=\"this.src='https://via.placeholder.com/60'\"></td>"
                        + "<td><strong>" + p.title + "</strong></td>"
                        + "<td><span class=\"badge badge-blue\">" + (p.category || "General") + "</span></td>"
                        + "<td><strong>Rs." + Number(p.price).toLocaleString("en-IN") + "</strong></td>"
                        + "<td>" + (p.original_price ? "Rs." + Number(p.original_price).toLocaleString("en-IN") : "-") + "</td>"
                        + "<td>" + (p.is_featured ? "<span class=\"badge badge-gold\">Yes</span>" : "<span class=\"badge badge-gray\">No</span>") + "</td>"
                        + "<td><div class=\"action-btns\">"
                        + "<button class=\"action-btn edit-btn\" onclick=\"editProduct(" + p.id + ")\" title=\"Edit\"><i class=\"fas fa-edit\"></i></button>"
                        + "<button class=\"action-btn delete-btn\" onclick=\"deleteProduct(" + p.id + ", '" + safeTitle + "')\" title=\"Delete\"><i class=\"fas fa-trash\"></i></button>"
                        + "</div></td></tr>";
                }
                tbody.innerHTML = html;
                var totalPages = Math.ceil(count / PRODUCTS_PER_PAGE);
                renderAdminPagination("productsPagination", page, totalPages, loadProducts);
            });
        }

        loadProducts(1);
    });
</script>
</body>
</html>
