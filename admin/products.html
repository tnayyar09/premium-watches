<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - LUXE WATCHES Admin</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <i class="fas fa-clock"></i>
                <div><span class="logo-main">LUXE</span><span class="logo-sub">ADMIN</span></div>
            </div>
            <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
            <a href="products.html" class="nav-item active"><i class="fas fa-box"></i><span>Products</span></a>
            <a href="banners.html" class="nav-item"><i class="fas fa-images"></i><span>Banners</span></a>
            <a href="messages.html" class="nav-item"><i class="fas fa-envelope"></i><span>Messages</span></a>
            <div class="nav-divider"></div>
            <a href="../index.html" class="nav-item"><i class="fas fa-globe"></i><span>View Website</span></a>
            <a href="#" class="nav-item logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <h2>Products Management</h2>
            </div>
            <div class="topbar-right">
                <button class="btn-add" id="addProductBtn"><i class="fas fa-plus"></i> Add Product</button>
            </div>
        </header>

        <div class="content-area">
            <!-- Search & Filter Bar -->
            <div class="toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchProducts" placeholder="Search products...">
                </div>
                <div class="toolbar-filters">
                    <select id="filterCategory">
                        <option value="">All Categories</option>
                    </select>
                    <select id="filterFeatured">
                        <option value="">All Products</option>
                        <option value="true">Featured Only</option>
                        <option value="false">Non-Featured</option>
                    </select>
                </div>
            </div>

            <!-- Products Table -->
            <div class="table-container">
                <table class="data-table" id="productsTable">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Original Price</th>
                            <th>Featured</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <tr><td colspan="7" class="loading-cell"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="table-pagination" id="productsPagination"></div>
        </div>
    </main>

    <!-- Product Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle"><i class="fas fa-box"></i> Add Product</h3>
                <button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <input type="hidden" id="productId">
                    
                    <div class="form-group">
                        <label><i class="fas fa-heading"></i> Product Title *</label>
                        <input type="text" id="prodTitle" required placeholder="e.g. Rolex Submariner">
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-align-left"></i> Short Description</label>
                        <textarea id="prodDescription" rows="3" placeholder="Brief description of the watch..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-rupee-sign"></i> Price (₹) *</label>
                            <input type="number" id="prodPrice" required min="0" step="0.01" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-tag"></i> Original Price (₹)</label>
                            <input type="number" id="prodOriginalPrice" min="0" step="0.01" placeholder="0.00 (for discount)">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-folder"></i> Category *</label>
                            <select id="prodCategory" required>
                                <option value="">Select Category</option>
                                <option value="Luxury">Luxury</option>
                                <option value="Sports">Sports</option>
                                <option value="Classic">Classic</option>
                                <option value="Smart Watch">Smart Watch</option>
                                <option value="Casual">Casual</option>
                                <option value="Dress">Dress</option>
                            </select>
                            <div class="custom-cat-wrap">
                                <input type="text" id="prodCustomCategory" placeholder="Or type new category">
                            </div>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-star"></i> Featured?</label>
                            <div class="toggle-switch-wrap">
                                <label class="toggle-switch">
                                    <input type="checkbox" id="prodFeatured">
                                    <span class="toggle-slider"></span>
                                </label>
                                <span class="toggle-label" id="featuredLabel">No</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-image"></i> Image URL *</label>
                        <input type="url" id="prodImageUrl" required placeholder="https://example.com/image.jpg">
                        <div class="image-preview-wrap">
                            <div class="image-preview" id="imagePreview">
                                <i class="fas fa-image"></i>
                                <span>Image Preview</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel" id="cancelProduct">Cancel</button>
                        <button type="submit" class="btn-save" id="saveProductBtn">
                            <span class="btn-text"><i class="fas fa-save"></i> Save Product</span>
                            <span class="btn-loading" style="display:none"><i class="fas fa-spinner fa-spin"></i> Saving...</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal modal-sm">
            <div class="modal-header modal-header-danger">
                <h3><i class="fas fa-exclamation-triangle"></i> Confirm Delete</h3>
            </div>
            <div class="modal-body text-center">
                <p>Are you sure you want to delete <strong id="deleteItemName"></strong>?</p>
                <p class="text-muted">This action cannot be undone.</p>
                <div class="form-actions">
                    <button class="btn-cancel" id="cancelDelete">Cancel</button>
                    <button class="btn-delete" id="confirmDelete">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/admin.js"></script>
    <script>
        checkAuth();
        
        let productPage = 1;
        const PRODUCTS_PER_PAGE = 8;
        let deleteProductId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            loadCategoryFilter();
            setupProductListeners();

            // Check URL params for auto-open
            const params = new URLSearchParams(window.location.search);
            if (params.get('action') === 'add') openProductModal();
        });

        async function loadCategoryFilter() {
            try {
                const { data } = await adminQuery('products', { select: 'category' });
                const cats = [...new Set(data.map(p => p.category).filter(Boolean))];
                const select = document.getElementById('filterCategory');
                cats.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c; opt.textContent = c;
                    select.appendChild(opt);
                });
            } catch(e) { console.error(e); }
        }

        async function loadProducts(page = 1) {
            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = '<tr><td colspan="7" class="loading-cell"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';
            productPage = page;

            try {
                const filters = [];
                const search = document.getElementById('searchProducts').value.trim();
                const catFilter = document.getElementById('filterCategory').value;
                const featFilter = document.getElementById('filterFeatured').value;

                if (search) filters.push(`title=ilike.*${encodeURIComponent(search)}*`);
                if (catFilter) filters.push(`category=eq.${encodeURIComponent(catFilter)}`);
                if (featFilter) filters.push(`is_featured=eq.${featFilter}`);

                const offset = (page - 1) * PRODUCTS_PER_PAGE;

                const { data, count } = await adminQuery('products', {
                    filters,
                    order: 'created_at.desc',
                    limit: PRODUCTS_PER_PAGE,
                    offset,
                    count: true
                });

                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="empty-cell"><i class="fas fa-inbox"></i> No products found</td></tr>';
                    document.getElementById('productsPagination').innerHTML = '';
                    return;
                }

                tbody.innerHTML = data.map(p => `
                    <tr>
                        <td><img src="${p.image_url}" class="table-img" alt="${p.title}" onerror="this.src='https://via.placeholder.com/60'"></td>
                        <td>
                            <strong>${p.title}</strong>
                            <br><small class="text-muted">${(p.short_description || '').substring(0, 50)}...</small>
                        </td>
                        <td><span class="badge badge-blue">${p.category || 'General'}</span></td>
                        <td><strong>₹${Number(p.price).toLocaleString('en-IN')}</strong></td>
                        <td>${p.original_price ? '₹' + Number(p.original_price).toLocaleString('en-IN') : '-'}</td>
                        <td>
                            <span class="badge ${p.is_featured ? 'badge-gold' : 'badge-gray'}">
                                ${p.is_featured ? '★ Yes' : 'No'}
                            </span>
                        </td>
                        <td>
                            <div class="action-btns">
                                <button class="action-btn edit-btn" onclick="editProduct(${p.id})" title="Edit">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="action-btn delete-btn" onclick="deleteProduct(${p.id}, '${p.title.replace(/'/g, "\\'")}')" title="Delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');

                // Pagination
                const totalPages = Math.ceil(count / PRODUCTS_PER_PAGE);
                renderAdminPagination('productsPagination', page, totalPages, loadProducts);

            } catch (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="7" class="empty-cell">Error loading products</td></tr>';
            }
        }

        function setupProductListeners() {
            // Add button
            document.getElementById('addProductBtn').addEventListener('click', openProductModal);
            
            // Close modal
            document.getElementById('closeModal').addEventListener('click', closeProductModal);
            document.getElementById('cancelProduct').addEventListener('click', closeProductModal);
            document.getElementById('productModal').addEventListener('click', (e) => {
                if (e.target.id === 'productModal') closeProductModal();
            });

            // Image preview
            document.getElementById('prodImageUrl').addEventListener('input', function() {
                const preview = document.getElementById('imagePreview');
                if (this.value) {
                    preview.innerHTML = `<img src="${this.value}" alt="Preview" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-exclamation-triangle\\'></i><span>Invalid URL</span>'">`;
                } else {
                    preview.innerHTML = '<i class="fas fa-image"></i><span>Image Preview</span>';
                }
            });

            // Featured toggle label
            document.getElementById('prodFeatured').addEventListener('change', function() {
                document.getElementById('featuredLabel').textContent = this.checked ? 'Yes' : 'No';
            });

            // Search
            let searchTimer;
            document.getElementById('searchProducts').addEventListener('input', () => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => loadProducts(1), 400);
            });

            // Filters
            document.getElementById('filterCategory').addEventListener('change', () => loadProducts(1));
            document.getElementById('filterFeatured').addEventListener('change', () => loadProducts(1));

            // Form submit
            document.getElementById('productForm').addEventListener('submit', saveProduct);

            // Delete modal
            document.getElementById('cancelDelete').addEventListener('click', () => {
                document.getElementById('deleteModal').classList.remove('active');
            });
            document.getElementById('confirmDelete').addEventListener('click', confirmDeleteProduct);
        }

        function openProductModal(product = null) {
            const modal = document.getElementById('productModal');
            const form = document.getElementById('productForm');
            form.reset();
            document.getElementById('imagePreview').innerHTML = '<i class="fas fa-image"></i><span>Image Preview</span>';
            document.getElementById('featuredLabel').textContent = 'No';

            if (product) {
                document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> Edit Product';
                document.getElementById('productId').value = product.id;
                document.getElementById('prodTitle').value = product.title;
                document.getElementById('prodDescription').value = product.short_description || '';
                document.getElementById('prodPrice').value = product.price;
                document.getElementById('prodOriginalPrice').value = product.original_price || '';
                document.getElementById('prodCategory').value = product.category || '';
                document.getElementById('prodFeatured').checked = product.is_featured;
                document.getElementById('featuredLabel').textContent = product.is_featured ? 'Yes' : 'No';
                document.getElementById('prodImageUrl').value = product.image_url;
                document.getElementById('imagePreview').innerHTML = `<img src="${product.image_url}" alt="Preview">`;
            } else {
                document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus-circle"></i> Add New Product';
                document.getElementById('productId').value = '';
            }

            modal.classList.add('active');
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        async function editProduct(id) {
            try {
                const { data } = await adminQuery('products', { filters: [`id=eq.${id}`] });
                if (data && data.length) openProductModal(data[0]);
            } catch(e) { showToast('Error loading product', 'error'); }
        }

        async function saveProduct(e) {
            e.preventDefault();
            const btn = document.getElementById('saveProductBtn');
            btn.querySelector('.btn-text').style.display = 'none';
            btn.querySelector('.btn-loading').style.display = 'inline-flex';

            const id = document.getElementById('productId').value;
            const customCat = document.getElementById('prodCustomCategory').value.trim();
            
            const productData = {
                title: document.getElementById('prodTitle').value.trim(),
                short_description: document.getElementById('prodDescription').value.trim(),
                price: parseFloat(document.getElementById('prodPrice').value),
                original_price: document.getElementById('prodOriginalPrice').value ? parseFloat(document.getElementById('prodOriginalPrice').value) : null,
                category: customCat || document.getElementById('prodCategory').value,
                is_featured: document.getElementById('prodFeatured').checked,
                image_url: document.getElementById('prodImageUrl').value.trim()
            };

            try {
                let success;
                if (id) {
                    success = await adminUpdate('products', id, productData);
                } else {
                    success = await adminInsert('products', productData);
                }

                if (success) {
                    showToast(id ? 'Product updated successfully!' : 'Product added successfully!', 'success');
                    closeProductModal();
                    loadProducts(productPage);
                } else {
                    showToast('Failed to save product', 'error');
                }
            } catch(e) {
                showToast('Error saving product', 'error');
                console.error(e);
            } finally {
                btn.querySelector('.btn-text').style.display = 'inline-flex';
                btn.querySelector('.btn-loading').style.display = 'none';
            }
        }

        function deleteProduct(id, name) {
            deleteProductId = id;
            document.getElementById('deleteItemName').textContent = name;
            document.getElementById('deleteModal').classList.add('active');
        }

        async function confirmDeleteProduct() {
            if (!deleteProductId) return;
            try {
                const success = await adminDelete('products', deleteProductId);
                if (success) {
                    showToast('Product deleted successfully!', 'success');
                    loadProducts(productPage);
                } else {
                    showToast('Failed to delete product', 'error');
                }
            } catch(e) {
                showToast('Error deleting product', 'error');
            }
            document.getElementById('deleteModal').classList.remove('active');
            deleteProductId = null;
        }
    </script>
</body>
</html>
